server:
  port: 8081

app:
  cors:
    allowed-origins: http://localhost:5173

spring:
  application:
    name: keynor-rpg
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:keynor_rpg}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
